opencollection: 1.0.0
info:
  name: tasks-manager-collection
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ''
      port: ''
      auth:
        username: ''
        password: ''
      bypassProxy: ''
items:
  - info:
      name: Tasks
      type: http
      seq: 1
    http:
      method: GET
      url: http://localhost:8080/tasks
      auth: inherit
    settings:
      encodeUrl: true
      timeout: 0
      followRedirects: true
      maxRedirects: 5
  - info:
      name: New Task
      type: http
      seq: 2
    http:
      method: POST
      url: http://localhost:8080/tasks
      auth: inherit
    settings:
      encodeUrl: true
      timeout: 0
      followRedirects: true
      maxRedirects: 5
  - info:
      name: Update task
      type: http
      seq: 3
    http:
      method: POST
      url: http://localhost:8080/tasks
      body:
        type: json
        data: |-
          {
            "title": "ligar para dentista"
          }
      auth: inherit
    settings:
      encodeUrl: true
      timeout: 0
      followRedirects: true
      maxRedirects: 5
bundled: true
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
    exportedAt: '2026-07-05T23:56:01.604Z'
    exportedUsing: Bruno
